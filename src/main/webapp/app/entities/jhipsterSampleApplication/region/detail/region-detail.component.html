<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (region(); as regionRef) {
      <div>
        <h2 data-cy="regionDetailsHeading">
          <span jhiTranslate="jhipsterSampleApplicationApp.jhipsterSampleApplicationRegion.detail.title">Region</span>
        </h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ regionRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterSampleApplicationApp.jhipsterSampleApplicationRegion.regionName">Region Name</span></dt>
          <dd>
            <span>{{ regionRef.regionName }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Назад</span>
        </button>

        <button type="button" [routerLink]="['/jhipstersampleapplication/region', regionRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Изменить</span>
        </button>
      </div>
    }
  </div>
</div>
